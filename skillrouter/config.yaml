# default_model is a *preference* — what skillrouter will use when no skill
# matches the prompt. If not installed, skillrouter auto-picks the smallest
# installed non-embedding Ollama model. Leave commented to always auto-pick.
# default_model: qwen2.5:3b
providers:
  ollama:
    host: http://localhost:11434
  anthropic:
    api_key_env: ANTHROPIC_API_KEY
    default_model: claude-sonnet-4-5
matching:
  # "keyword" = fast substring match (default, zero extra deps).
  # "embedding" = semantic match via Ollama embeddings. Requires:
  #   `ollama pull nomic-embed-text` (or whatever you set as embed_model).
  method: embedding
  embed_model: nomic-embed-text:latest
  threshold: 0.50  # min cosine similarity to count as a match (embedding mode only)

# Classify installed Ollama tags by name pattern.
# Each rule: "match" (substring, case-insensitive) + kinds it can handle.
# Strength is resolved from "strength_by_size" (looks for tokens in the tag like :7b, :3b, e4b)
# or falls back to "strength" if size not present.
model_rules:
  - match: "coder"
    kinds: [coding, general]
    strength_by_size:
      "1.5b": tiny
      "3b": small
      "7b": strong
      "14b": strong
      "32b": frontier
    strength: small
  - match: "gemma"
    kinds: [general, reasoning, summarization, rewriting]
    strength_by_size:
      "2b": small
      "e4b": strong
      "9b": strong
      "27b": frontier
    strength: small
  - match: "qwen"
    kinds: [general, reasoning, summarization, rewriting, coding]
    strength_by_size:
      "1.5b": tiny
      "1.7b": tiny
      "3b": small
      "4b": small
      "7b": strong
      "14b": strong
      "32b": frontier
    strength: small
  - match: "llama"
    kinds: [general, reasoning, summarization, rewriting]
    strength_by_size:
      "1b": tiny
      "3b": small
      "7b": strong
      "8b": strong
      "70b": frontier
    strength: tiny
  - match: "tinyllama"
    kinds: [general]
    strength: tiny
  - match: "moondream"
    kinds: [vision]
    strength: small
  - match: "mistral"
    kinds: [general, reasoning, summarization, rewriting]
    strength_by_size:
      "7b": strong
      "22b": frontier
    strength: small

# Known Anthropic models — always reachable if ANTHROPIC_API_KEY is set.
anthropic_models:
  claude-sonnet-4-5:
    kinds: [coding, reasoning, summarization, rewriting, general]
    strength: frontier
    # USD per million tokens. Used for cost tracking in logs and --cost.
    price_per_mtok_input: 3.00
    price_per_mtok_output: 15.00

default_fallback_kind: general
